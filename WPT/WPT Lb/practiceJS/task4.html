<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Task</title>
</head>
<style>
    .outer
    {
        border: 1px solid black;
        border-radius : 5px;
        padding: 10px;
        display: inline-block;
        position: relative;
        left: 40%;
        top: 150px;
    }
    #table
    {
        width: 250px;
        height: 250px;
        margin: 10px;
    }
    label,input
    {
        position: relative;
        left: 50px;
    }
    button
    {
        margin: 10px;
        position: relative;
        left: 80px;
        width: 90px;
        height: 30px;
        border-radius: 15px;
    }


</style>
<body>
<div class="outer">
    <table border="1px" id="table">
        <tr>
            <td id="b1">1</td>
            <td id="b2">2</td>
            <td id="b3">3</td>
        </tr>
        <tr>
            <td id="b4">4</td>
            <td id="b5">5</td>
            <td id="b6">6</td>
        </tr>
        <tr>
            <td id="b7">7</td>
            <td id="b8">8</td>
            <td id="b9">9</td>
        </tr>
    </table>
    <label for="number">Enter Number</label><br>
    <input type="text" name="num" id="number"><br>
    <label for="color">Enter color</label><br>
    <input type="text" name="col" id="color"><br>   
    <button type="button" onclick="Magic()">Magic</button>

    <script>
        function Magic()
        {
            let num = document.getElementById("number").value;
            let color = document.getElementById("color").value;
            switch(parseInt(num))
            {
                case 1:
                    document.getElementById("b1").style.backgroundColor = `${color}`;
                    break;
                case 2:
                    document.getElementById("b2").style.backgroundColor = `${color}`;
                    break;
                case 3:
                    document.getElementById("b3").style.backgroundColor = `${color}`;
                    break;
                case 4:
                    document.getElementById("b4").style.backgroundColor = `${color}`;
                    break;
                case 5:
                    document.getElementById("b5").style.backgroundColor = `${color}`;
                    break;
                case 6:
                    document.getElementById("b6").style.backgroundColor = `${color}`;
                    break;
                case 7:
                    document.getElementById("b7").style.backgroundColor = `${color}`;
                    break;
                case 8:
                    document.getElementById("b8").style.backgroundColor = `${color}`;
                    break;
                case 9:
                    document.getElementById("b9").style.backgroundColor = `${color}`;
                    break;
                default:
                    // document.getElementById("b1").style.backgroundColor = "";
                    document.querySelectorAll('td').forEach(el => { el.style.backgroundColor = "";});
                    break;
            }
        }
    </script>
</div>
</body>
</html>
