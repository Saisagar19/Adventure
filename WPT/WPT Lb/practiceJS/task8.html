<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Table</title>
</head>
<body>
    <button type="button" onclick="generateTable()" id="b1">Generate Table</button>
    <table id="table" border="1px">
        <thead>
            <tr>
                <td>ID</td>
                <td>NAME</td>
                <td>POST</td>
                <td>SALARY</td>
            </tr>
        </thead>
        <tbody id="tb">

        </tbody>
    </table>

<script>
    let emp = [
                {id:1,name:"Abhishek",post:"Manager",salary:"950000"},
                {id:2,name:"Payal",post:"HR",salary:"950000"},
                {id:3,name:"Swayam",post:"TL",salary:"950000"},
                {id:4,name:"Swati",post:"Fullstack Developer",salary:"950000"},
                {id:5,name:"Tanmay",post:"React Developer",salary:"950000"}
            ]

const generateTable = () =>{
    let tbody = document.getElementById("tb");
    for(let i = 0; i<emp.length;i++)
    {
        let neRow= document.createElement('tr');
        neRow.innerHTML = `<td>${emp[i].id}</td><td>${emp[i].name}</td><td>${emp[i].post}</td><td>${emp[i].salary}</td>`
        tbody.appendChild(neRow);
    }
    let btn = document.getElementById('b1').disabled = true;
}

</script>
</body>
</html>
