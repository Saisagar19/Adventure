<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="outer">
        <label for="num1">Enter Number 1:</label>
        <input type="text" name="number1" id="num1">
        <label for="num2">Enter Number 2:</label>
        <input type="text" name="number2" id="num2">
        <p>Result: <p id="res">0</p></p>

        <button type="button" id="add" onclick="add()">Add</button>
        <button type="button" id="sub" onclick="sub()">Sub</button>
        <button type="button" id="mul" onclick="mul()">Mul</button>
        <button type="button" id="div" onclick="div()">Div</button>
    </div>

    <script>
        function add()
        {
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            return document.getElementById("res").innerHTML = parseInt(num1)+parseInt(num2);
        }
        function sub()
        {
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            return document.getElementById("res").innerHTML = parseInt(num1)-parseInt(num2);
        }
        function mul()
        {
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            return document.getElementById("res").innerHTML = parseInt(num1)*parseInt(num2);
        }
        function div()
        {
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            return document.getElementById("res").innerHTML = parseInt(num1)/parseInt(num2);
        }

    
    </script>
</body>
</html>
