<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    
    <Script>
        let emp = {id:101,name:"sagar",post:"SDE",salary:"45000",gender:"male",age:"22",city:"pune",department:"IT"};
        let jsonData = JSON.stringify(emp);     // javascricpt convert obj type data to json
        document.writeln(jsonData);

        document.writeln(`<hr>`);
        //Json.parse(): convert json type data into js obj.
        let jsObjData  = JSON.parse(jsonData);
        document.write(jsObjData.name)

    </Script>
</body>
</html>
