<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertion Of JSON to OBJ</title>
</head>
<body>
    <script>
        let emp={id:1,name:"sagar",post:"SDE",salary:85000}
        let jsonObj = JSON.stringify(emp);
        document.writeln(jsonObj);
        document.writeln(`<hr>`)
        let objJson=JSON.parse(jsonObj)
        document.writeln(objJson.name);
    </script>
</body>
</html>
