<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Data</title>
  <script src="./dashboard.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-md-9">
          <button type="button" onclick="getData()" name="fetchData" class="btn btn-primary mt-2 mb-2">GET</button>
          <table border="" class="table table-bordered table-striped">
            <thead>
            <tr>
            <th>ID</th>
            <th>NAME</th>
            <th>AGE</th>
            <th>EMAIL</th>
            <th>CITY</th>
            </tr>
            </thead>
            <tbody id="d1">

            </tbody>
            </table>
      </div>
      <div class="col-md-3">
        <br>
        <label for="">ID No. :</label>
        <input type="text" name="uid" id="uid" class="form-control">
        <button type="button" onclick="deleteRecord()" class="btn btn-danger mt-2">DELETE</button>
      </div>

      <div class="col-md-6">
        <h3>Add User Data</h3>
        <form action="">
          <label for="">Enter Your Name: </label>
          <input type="text" name = "name" id="addname" class="form-control">

          <label for="">Enter Your Age: </label>
          <input type="text" name = "age" id="addage" class="form-control">

          <label for="">Enter Your Email: </label>
          <input type="text" name = "email" id="addemail" class="form-control">

          <label for="">Enter Your City: </label>
          <input type="text" name = "city" id="addcity" class="form-control">

          <button type="button" onclick="" class="btn btn-success mt-2">ADD</button>
        </form>
      </div>

      <div class="col-md-6">
        <br>
             <label for="">Enter ID Fetch Single User Data</label>
             <input type="text" name="gid" id="gid" class="form-control">
             <button type="button" onclick="getSingleId()" class="btn btn-primary mt-2">Get Data</button>
             <br>
        <h3>Update User Data</h3>
        <form action="">
          <label for="">Update User Name: </label>
          <input type="text" name = "uname" id="updatename" class="form-control">

          <label for="">Update User Age: </label>
          <input type="text" name = "uage" id="updateage" class="form-control">

          <label for="">Update User Email: </label>
          <input type="text" name = "uemail" id="updateemail" class="form-control">

          <label for="">Update User City: </label>
          <input type="text" name = "ucity" id="updatecity" class="form-control">

          <button type="button" onclick="" class="btn btn-success mt-2">UPDATE</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
