<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Change</title>

    <style>
        
        body{
            background-color: black;
        }
        .fig1
        {
            border: 1px solid ;
            width: 300px;
            border-radius: 10px;
            margin: auto;
            background-color: black;
            color: white;
            margin-top: 150px;
            
        }
        #text-1{
            margin-left:110px;
            /* text-align: center; */
        }
        .btn-change
        {
            border: 1px solid rgb(0, 128, 255);
            background-color: rgb(0, 128, 255);
            width: 120px;
            height: 50px;
            display: flexbox;  
            border-radius: 50px;  
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: white;

        }
        .btn-area{
            display: flexbox;
            margin-left: 450px;
            margin-top: 30px;
              
        }
    </style>
</head>
<body>
    <div id="center-main">
        <figure class="fig1">
            <img id="change" src="../Assets/images/gulabJamun.jpg" alt="gulab_Jamun" style="width: 300px; height: 200px; border-radius: 3px;">    
            <p id="text-1">Gulab Jamun</p>
        </figure>
    </div>
    <div class="btn-area">
        <button type="button" onclick="change()" name="brownie" class="btn-change">Brownie</button>
        <button type="button" onclick="change1()" name="brownie" class="btn-change">Motichur ladoo</button>
        <button type="button" onclick="change2()" name="brownie" class="btn-change">Imrati</button>
        <button type="button" onclick="change3()" name="brownie" class="btn-change">Jalebi</button>
        <button type="button" onclick="change4()" name="brownie" class="btn-change">Gulab Jamun</button>
    </div>

    <script>
        function change(){
            document.getElementById("change").src="../Assets/images/brownie.jpg";
            document.getElementById("text-1").innerHTML ="Brownie";
        }
        function change1(){
            document.getElementById("change").src="../Assets/images/motichur_ladoo.jpg";
            document.getElementById("text-1").innerHTML ="Motichur ladoo";
        }
        function change2(){
            document.getElementById("change").src="../Assets/images/imrati.jpg";
            document.getElementById("text-1").innerHTML ="Imrati";
        }
        function change3(){
            document.getElementById("change").src="../Assets/images/jalebi.jpg";
            document.getElementById("text-1").innerHTML ="Jalebi";
        }
        function change4(){
            document.getElementById("change").src="../Assets/images/gulabJamun.jpg";
            document.getElementById("text-1").innerHTML ="Gulab Jamun";
        }

    </script>
</body>
</html>
